services:
  # 一次性：把模板 config.json 渲染成实值 config.json
  nofx-config:
    image: alpine:3.20
    container_name: nofx-config
    command: >
      sh -euxc '
        apk add --no-cache gettext;
        mkdir -p /out;
        # 从 secrets 读取值并导出为环境变量（供 envsubst 使用）
        export HYPERLIQUID_PRIV_KEY="$(cat /run/secrets/hyperliquid_priv_key)"
        export HYPERLIQUID_WALLET_ADDR="$(cat /run/secrets/hyperliquid_wallet_addr)"
        export HYPERLIQUID_QWEN_PRIV_KEY="$(cat /run/secrets/hyperliquid_qwen_priv_key)"
        export HYPERLIQUID_QWEN_WALLET_ADDR="$(cat /run/secrets/hyperliquid_qwen_wallet_addr)"
        export DEEPSEEK_KEY="$(cat /run/secrets/deepseek_key)"
        export QWEN_KEY="$(cat /run/secrets/qwen_key)"
        # 渲染模板 -> 实值
        envsubst < /templates/config.json > /out/config.json
        chmod 0440 /out/config.json
      '
    volumes:
      - type: bind
        source: ./config.json            # 这是模板（含 ${...} 变量）
        target: /templates/config.json
        read_only: true
      - type: bind
        source: ./rendered_config        # 输出目录（会得到最终 config.json）
        target: /out
    secrets:
      - hyperliquid_priv_key
      - hyperliquid_wallet_addr
      - hyperliquid_qwen_priv_key
      - hyperliquid_qwen_wallet_addr
      - deepseek_key
      - qwen_key
    restart: "no"

  # 后端服务（只在内网暴露；只读根；降权）
  nofx:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
    container_name: nofx-trading
    restart: unless-stopped

    expose:
      - "8080"                 # 仅供同网络服务访问

    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
      - /run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    volumes:
      - type: bind
        source: ./rendered_config/config.json
        target: /app/config.json
        read_only: true
      - type: bind
        source: ./decision_logs
        target: /app/decision_logs
      - /etc/localtime:/etc/localtime:ro

    environment:
      - TZ=${NOFX_TIMEZONE:-Asia/Shanghai}

    networks:
      - nofx-network

    depends_on:
      nofx-config:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    mem_limit: 1g
    cpus: "2.0"
    ulimits:
      nofile: 65536

  nofx-frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    container_name: nofx-frontend
    restart: unless-stopped
    ports:
      - "${NOFX_FRONTEND_PORT:-3000}:80"
    networks:
      - nofx-network
    depends_on:
      - nofx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  nofx-network:
    driver: bridge

secrets:
  hyperliquid_priv_key:
    file: ./secrets/hyperliquid_priv_key.txt     # 内容：不带 0x 的私钥
  hyperliquid_wallet_addr:
    file: ./secrets/hyperliquid_wallet_addr.txt  # 内容：0x... 地址
  hyperliquid_qwen_priv_key:
    file: ./secrets/hyperliquid_qwen_priv_key.txt # 内容：不带 0x 的私钥
  hyperliquid_qwen_wallet_addr:
    file: ./secrets/hyperliquid_qwen_wallet_addr.txt # 内容：0x... 地址
  deepseek_key:
    file: ./secrets/deepseek_key.txt
  qwen_key:
    file: ./secrets/qwen_key.txt
